<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Factory — BoomScreen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #E6007E;
      --pink-light: #FFF0F7;
      --pink-hover: #CC006E;
      --pink-glow: rgba(230, 0, 126, 0.12);
      --bg: #FAFAFA;
      --surface: #FFFFFF;
      --border: #E8E8E8;
      --border-focus: #D0D0D0;
      --text: #1A1A1A;
      --text-secondary: #6B6B6B;
      --text-muted: #999999;
      --terminal-bg: #0D1117;
      --terminal-text: #C9D1D9;
      --terminal-green: #7EE787;
      --terminal-yellow: #F0C674;
      --terminal-red: #F97583;
      --terminal-dim: #484F58;
      --radius: 10px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.05), 0 1px 4px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: var(--pink);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { width: 18px; height: 18px; }

    .header-title {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-title span {
      color: var(--text-muted);
      font-weight: 500;
    }

    .nav-tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: 20px;
    }

    .nav-tabs a {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }

    .nav-tabs a:hover {
      color: var(--text);
      background: var(--bg);
    }

    .nav-tabs a.active {
      color: var(--pink);
      background: var(--pink-light);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 100px;
      background: #F0FFF4;
      color: #22863A;
      border: 1px solid #C6E6CC;
    }

    .status-badge.running {
      background: var(--pink-light);
      color: var(--pink);
      border-color: #F5C0DC;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22863A;
    }

    .status-badge.running .status-dot {
      background: var(--pink);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 0;
      height: calc(100vh - 60px);
    }

    /* Form Panel */
    .form-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px;
    }

    .form-panel::-webkit-scrollbar { width: 5px; }
    .form-panel::-webkit-scrollbar-track { background: transparent; }
    .form-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* Magic Link */
    .magic-link-section {
      margin-bottom: 24px;
    }

    .magic-link-section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .magic-link-input-wrap {
      display: flex;
      gap: 8px;
    }

    .magic-link-input-wrap input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .magic-link-input-wrap input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px var(--pink-glow);
    }

    .magic-link-input-wrap input::placeholder {
      color: var(--text-muted);
    }

    .btn-run {
      padding: 10px 22px;
      background: var(--pink);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .btn-run:hover:not(:disabled) {
      background: var(--pink-hover);
      box-shadow: 0 2px 8px rgba(230, 0, 126, 0.25);
    }

    .btn-run:active:not(:disabled) {
      transform: scale(0.97);
    }

    .btn-run:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Sections */
    .config-section {
      margin-bottom: 6px;
    }

    .section-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 0;
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      font-family: 'Montserrat', sans-serif;
    }

    .section-toggle-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .section-toggle h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .section-chevron {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      transition: transform 0.2s ease;
    }

    .config-section.open .section-chevron {
      transform: rotate(180deg);
    }

    .section-body {
      display: none;
      padding: 16px 0 8px;
    }

    .config-section.open .section-body {
      display: block;
    }

    /* Form Fields */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field-grid.cols-3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    .field input,
    .field select {
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px var(--pink-glow);
    }

    .field input[type="number"] {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    /* Log Panel */
    .log-panel {
      background: var(--terminal-bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid #21262D;
      flex-shrink: 0;
    }

    .log-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .log-header h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--terminal-text);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .log-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--terminal-dim);
      background: #161B22;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .btn-clear-log {
      background: none;
      border: 1px solid #30363D;
      color: var(--terminal-dim);
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-clear-log:hover {
      color: var(--terminal-text);
      border-color: #484F58;
    }

    .log-output {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: var(--terminal-text);
    }

    .log-output::-webkit-scrollbar { width: 6px; }
    .log-output::-webkit-scrollbar-track { background: transparent; }
    .log-output::-webkit-scrollbar-thumb { background: #30363D; border-radius: 10px; }

    .log-line {
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-line .ts {
      color: var(--terminal-dim);
      margin-right: 6px;
    }

    .log-line.info .lvl { color: var(--terminal-green); }
    .log-line.warn .lvl { color: var(--terminal-yellow); }
    .log-line.error .lvl { color: var(--terminal-red); font-weight: 500; }
    .log-line.error { color: var(--terminal-red); }

    .log-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--terminal-dim);
      font-family: 'Montserrat', sans-serif;
      gap: 8px;
    }

    .log-empty-icon {
      font-size: 28px;
      opacity: 0.4;
    }

    .log-empty p {
      font-size: 13px;
      font-weight: 500;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      color: white;
      z-index: 200;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .toast.error { background: #CF222E; }
    .toast.success { background: #1A7F37; }

    /* WireMock panel */
    .wiremock-view { display: none; height: calc(100vh - 60px); flex-direction: column; overflow: hidden; }
    .wiremock-view.active { display: flex; }
    .runner-view { display: grid; height: calc(100vh - 60px); overflow: hidden; }
    .runner-view.active { display: grid; }
    .runner-view:not(.active) { display: none; }

    .wm-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .wm-toolbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .wm-owner-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }
    .wm-owner-label select {
      min-width: 140px;
      padding: 6px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      color-scheme: light;
    }
    .wm-toolbar h3 { font-size: 13px; font-weight: 600; color: var(--text); }
    .wm-body {
      flex: 1;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      min-height: 0;
      overflow: hidden;
    }
    .wm-list-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px;
    }
    .wm-list-item {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      font-size: 12px;
    }
    .wm-list-item:hover { background: var(--bg); }
    .wm-list-item.selected { background: var(--pink-light); border-color: var(--pink); }
    .wm-list-item .method { font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--pink); margin-right: 8px; }
    .wm-list-item .url { font-family: 'JetBrains Mono', monospace; color: var(--text); word-break: break-all; }
    .wm-list-item .wm-mock-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
      word-break: break-word;
    }
    .wm-list-item .wm-mock-route {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }
    .wm-detail-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--terminal-bg);
      overflow: hidden;
    }
    .wm-detail-split-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .wm-detail-body-wrap {
      flex: 1 1 auto;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .wm-detail-body-wrap .json-block {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }
    .wm-log-resize-handle {
      flex: 0 0 7px;
      cursor: row-resize;
      background: #21262D;
      border-top: 1px solid #30363D;
      border-bottom: 1px solid #30363D;
      position: relative;
      touch-action: none;
    }
    .wm-log-resize-handle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 3px;
      border-radius: 2px;
      background: #484F58;
    }
    .wm-log-resize-handle:hover { background: #30363D; }
    .wm-log-panel {
      flex: 0 0 180px;
      min-height: 72px;
      max-height: min(75vh, 600px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .wm-log-panel .wm-log-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }
    .wm-detail-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-bottom: 1px solid #21262D;
      flex-shrink: 0;
    }
    .wm-detail-header .method-badge {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      background: #21262D;
      color: var(--terminal-green);
    }
    .wm-detail-actions { margin-left: auto; display: flex; gap: 8px; }
    .btn-wm {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #30363D;
      background: #161B22;
      color: var(--terminal-text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-wm:hover { background: #21262D; border-color: #484F58; }
    .btn-wm.primary { background: var(--pink); border-color: var(--pink); color: white; }
    .btn-wm.primary:hover { background: var(--pink-hover); }
    .btn-wm.danger { color: var(--terminal-red); border-color: #F97583; }
    .btn-wm.danger:hover { background: rgba(249,117,131,0.15); }
    .btn-wm:disabled { opacity: 0.45; cursor: not-allowed; }
    .json-block {
      flex: 1;
      overflow: auto;
      padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--terminal-text);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .json-block textarea {
      width: 100%;
      height: 100%;
      min-height: 200px;
      padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--terminal-text);
      background: #0D1117;
      border: 1px solid #21262D;
      border-radius: 0;
      resize: none;
      outline: none;
      box-sizing: border-box;
    }
    .wm-empty { color: var(--terminal-dim); padding: 24px; text-align: center; font-size: 13px; }
    .wm-log-section { padding: 12px 20px; border-bottom: 1px solid #21262D; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .wm-log-section h3 { font-size: 12px; font-weight: 600; color: var(--terminal-text); text-transform: uppercase; letter-spacing: 0.04em; }
    .wm-log-list { padding: 12px 20px; }
    .wm-log-entry {
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: 8px;
      background: #161B22;
      border: 1px solid #21262D;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .wm-log-entry:hover { border-color: #30363D; }
    .wm-log-entry .head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .wm-log-entry .method { font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--terminal-green); }
    .wm-log-entry .url { font-family: 'JetBrains Mono', monospace; color: var(--terminal-text); word-break: break-all; }
    .wm-log-entry .ts { font-size: 11px; color: var(--terminal-dim); }
    .wm-log-entry .body { margin-top: 8px; padding: 8px; background: #0D1117; border-radius: 6px; font-size: 11px; white-space: pre-wrap; word-break: break-all; color: var(--terminal-dim); display: none; }
    .wm-log-entry.open .body { display: block; }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 24px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      width: 100%;
      max-width: 720px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 14px; font-weight: 600; color: var(--text); }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); padding: 0 4px; line-height: 1; }
    .modal-body { flex: 1; min-height: 0; overflow: hidden; }
    .modal-body .json-block { border-radius: 0; }
    .modal-footer { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .wm-xml-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--terminal-dim);
      padding: 10px 20px 6px;
      border-top: 1px solid #21262D;
      flex-shrink: 0;
    }
    .wm-xml-block, .wm-json-block { margin-top: 0 !important; max-height: 45vh; overflow: auto; }
    .modal-xml-wrap {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-top: 1px solid var(--border);
      padding: 0 20px 12px;
      flex: 1;
    }
    .modal-xml-wrap.hidden { display: none !important; }
    .modal-xml-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin: 10px 0 6px;
    }
    #wmModalSplitBody {
      flex: 1;
      min-height: 180px;
      max-height: 42vh;
      width: 100%;
      padding: 12px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.45;
      color: var(--terminal-text);
      background: var(--terminal-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      resize: vertical;
      outline: none;
      box-sizing: border-box;
    }
    .modal.modal-xml-split { max-width: 920px; }
    .modal.modal-xml-split .modal-body { display: flex; flex-direction: column; min-height: 0; }
    .modal.modal-xml-split #wmModalBody { min-height: 140px; max-height: 32vh; }
    .modal.modal-file { max-width: 960px; max-height: 90vh; }
    .modal.modal-file .modal-body { display: flex; flex-direction: column; min-height: 400px; }
    .modal.modal-file .modal-body textarea {
      flex: 1;
      min-height: 60vh;
      width: 100%;
      padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: var(--terminal-text);
      background: var(--terminal-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      resize: none;
      outline: none;
      box-sizing: border-box;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(12px); }
    }

    /* Responsive */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .form-panel {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 50vh;
      }
    }
  </style>
</head>
<body>

          </div>
          <svg class="section-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>

    <!-- Log Panel -->
    <div class="log-panel">
      <div class="log-header">

          <h3>Output</h3>

      </div>
      <div class="log-output" id="logOutput">
        <div class="log-empty" id="logEmpty">

  <div id="wiremockView" class="wiremock-view">
    <div class="wm-toolbar">
      <div class="wm-toolbar-left">
        <h3>Mocks</h3>
        <label class="wm-owner-label">Owner
          <select id="wmOwnerSelect" aria-label="WireMock owner filter">

  <div id="wmModalOverlay" class="modal-overlay hidden">

        <button type="button" class="btn-wm" id="wmFileModalCancel">Cancel</button>
        <button type="button" class="btn-wm primary" id="wmFileModalSave">Save</button>
      </div>

  <script>
    const $ = (sel) => document.querySelector(sel);
    const btnRun = $("#btnRun");
    const magicLinkInput = $("#magicLink");
    const logOutput = $("#logOutput");
    const logEmpty = $("#logEmpty");
    const logCount = $("#logCount");
    const statusBadge = $("#statusBadge");
    const statusText = $("#statusText");
    const btnClearLog = $("#btnClearLog");

    let lineCount = 0;
    let evtSource = null;
    let autoScroll = true;

    // Track auto-scroll: disable if user scrolls up, re-enable if at bottom
    logOutput.addEventListener("scroll", () => {
      const threshold = 40;
      autoScroll = logOutput.scrollHeight - logOutput.scrollTop - logOutput.clientHeight < threshold;
    });

    // Section toggles
    document.querySelectorAll(".section-toggle").forEach((btn) => {
      btn.addEventListener("click", () => {
        btn.closest(".config-section").classList.toggle("open");
      });
    });

    // Load config defaults
    async function loadConfig() {
      try {
        const res = await fetch("/api/config");
        const config = await res.json();
        for (const [section, values] of Object.entries(config)) {
          for (const [key, val] of Object.entries(values)) {
            const el = document.getElementById("cfg-" + section + "-" + key);
            if (el) el.value = val;
          }
        }
      } catch (e) {
        console.error("Failed to load config:", e);
      }
    }

    // Check initial status
    async function checkStatus() {
      try {
        const res = await fetch("/api/status");
        const data = await res.json();
        setRunning(data.running);
      } catch (e) { /* ignore */ }
    }

    function setRunning(running) {
      btnRun.disabled = running;
      btnRun.textContent = running ? "Running..." : "Run";
      statusBadge.className = "status-badge" + (running ? " running" : "");
      statusText.textContent = running ? "Running" : "Idle";
    }

    // Collect overrides from form
    function collectOverrides() {
      const overrides = {};
      document.querySelectorAll("[id^='cfg-']").forEach((el) => {
        const parts = el.id.replace("cfg-", "").split("-");
        const section = parts[0];
        const key = parts.slice(1).join("_");
        if (!overrides[section]) overrides[section] = {};
        const val = el.value;
        if (el.type === "number") {
          overrides[section][key] = Number(val);
        } else {
          overrides[section][key] = val;
        }
      });
      return overrides;
    }

    // Show toast
    function showToast(msg, type) {
      type = type || "error";
      const existing = document.querySelector(".toast");
      if (existing) existing.remove();
      const toast = document.createElement("div");
      toast.className = "toast " + type;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Create a log line element
    function createLogLine(entry) {
      const line = document.createElement("div");
      line.className = "log-line " + entry.level;

      const ts = document.createElement("span");
      ts.className = "ts";
      const time = entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString() : "";
      ts.textContent = time;

      const lvl = document.createElement("span");
      lvl.className = "lvl";
      lvl.textContent = "[" + entry.level.toUpperCase() + "] ";

      line.appendChild(ts);
      line.appendChild(lvl);
      line.appendChild(document.createTextNode(entry.message));
      return line;
    }

    // Create a system line element
    function createSystemLine(msg) {
      const line = document.createElement("div");
      line.className = "log-line";
      line.style.color = "#58A6FF";
      line.style.fontWeight = "500";
      line.textContent = "--- " + msg + " ---";
      return line;
    }

    // Append log line
    function appendLog(entry) {
      if (entry.message === "__RUN_COMPLETE__") {
        setRunning(false);
        logOutput.appendChild(createSystemLine("Run complete."));
        if (autoScroll) logOutput.scrollTop = logOutput.scrollHeight;
        return;
      }

      logEmpty.style.display = "none";

      logOutput.appendChild(createLogLine(entry));

      lineCount++;
      logCount.textContent = lineCount + " line" + (lineCount === 1 ? "" : "s");

      if (autoScroll) {
        logOutput.scrollTop = logOutput.scrollHeight;
      }
    }

    // Clear log output safely
    function clearLog() {
      while (logOutput.firstChild) {
        logOutput.removeChild(logOutput.firstChild);
      }
      lineCount = 0;
      logCount.textContent = "0 lines";
      logEmpty.style.display = "";
      logOutput.appendChild(logEmpty);
    }

    // SSE connection
    function connectSSE() {
      if (evtSource) evtSource.close();
      evtSource = new EventSource("/api/logs");
      evtSource.onmessage = function(e) {
        try {
          const entry = JSON.parse(e.data);
          appendLog(entry);
        } catch (err) { /* ignore parse errors */ }
      };
    }

    // Clear log button
    btnClearLog.addEventListener("click", clearLog);

    // Run button
    btnRun.addEventListener("click", async () => {
      const link = magicLinkInput.value.trim();
      if (!link) {
        showToast("Please paste a magic link");
        magicLinkInput.focus();
        return;
      }

      // Clear log for new run
      clearLog();

      const overrides = collectOverrides();

      try {
        const res = await fetch("/api/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ magicLink: link, overrides: overrides }),
        });

        if (res.status === 409) {
          showToast("A run is already in progress");
          return;
        }

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          showToast(data.error || "Failed to start run");
          return;
        }

        setRunning(true);
        logOutput.appendChild(createSystemLine("Run started"));
      } catch (e) {
        showToast("Network error — is the server running?");
      }
    });

    // Enter key submits
    magicLinkInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !btnRun.disabled) btnRun.click();
    });

    // ——— WireMock ———
    const tabRunner = $("#tabRunner");
    const tabWiremock = $("#tabWiremock");
    const runnerView = $("#runnerView");
    const wiremockView = $("#wiremockView");
    const wmList = $("#wmList");
    const wmDetailMethod = $("#wmDetailMethod");
    const wmDetailUrl = $("#wmDetailUrl");
    const wmDetailBody = $("#wmDetailBody");
    const wmEditMock = $("#wmEditMock");
    const wmEditResponseFile = $("#wmEditResponseFile");
    const wmDuplicateMock = $("#wmDuplicateMock");
    const wmDeleteMock = $("#wmDeleteMock");
    const wmAddMock = $("#wmAddMock");
    const wmOwnerSelect = $("#wmOwnerSelect");
    const wmLogList = $("#wmLogList");
    const wmRefreshLog = $("#wmRefreshLog");
    const wmModalOverlay = $("#wmModalOverlay");
    const wmModalTitle = $("#wmModalTitle");
    const wmModalBody = $("#wmModalBody");
    const wmModalSplitWrap = $("#wmModalSplitWrap");
    const wmModalSplitLabel = $("#wmModalSplitLabel");
    const wmModalSplitBody = $("#wmModalSplitBody");
    const wmEditMockModal = $("#wmEditMockModal");
    const wmModalClose = $("#wmModalClose");
    const wmModalCancel = $("#wmModalCancel");
    const wmModalSave = $("#wmModalSave");

    let wmMappings = [];
    let wmSelectedId = null;
    let wmAllRequests = [];
    let wmCurrentBodyFileName = null;

    function showView(name) {
      const isRunner = name === "runner";
      runnerView.classList.toggle("active", isRunner);
      wiremockView.classList.toggle("active", !isRunner);
      tabRunner.classList.toggle("active", isRunner);
      tabWiremock.classList.toggle("active", !isRunner);
      if (!isRunner) {
        if (wmOwnerSelect.value) {
          loadWmMappings();
          loadWmRequests();
        } else {
          wmMappings = [];
          wmSelectedId = null;
          renderWmList();
          renderWmDetailEmpty();
          renderWmLogList();
        }
      }
    }

    function syncWmAddMockEnabled() {
      wmAddMock.disabled = !wmOwnerSelect.value;
      wmAddMock.title = wmOwnerSelect.value ? "" : "Select an owner first";
    }

    function requestMatchesStub(reqEntry, stub) {
      const req = reqEntry.request || reqEntry;
      const stubReq = stub.request || {};
      const method = (req.method || "").toUpperCase();
      const stubMethod = (stubReq.method || "GET").toUpperCase();
      if (method !== stubMethod) return false;
      const reqUrl = req.url || req.absoluteUrl || "";
      const reqPath = reqUrl.replace(/^https?:\/\/[^/]+/, "") || "/";
      if (stubReq.urlPath) return reqPath === stubReq.urlPath || reqPath === stubReq.urlPath + "/";
      if (stubReq.url) return reqPath === stubReq.url || reqUrl === stubReq.url || reqPath.startsWith(stubReq.url);
      if (stubReq.urlPathPattern) {
        try {
          const re = new RegExp(stubReq.urlPathPattern);
          return re.test(reqPath);
        } catch (_) { return false; }
      }
      if (stubReq.urlPattern) {
        try {
          const re = new RegExp(stubReq.urlPattern);
          return re.test(reqPath) || re.test(reqUrl);
        } catch (_) { return false; }
      }
      return false;
    }

    function requestsForStub(requests, stubId) {
      const stub = wmMappings.find((m) => m.id === stubId);
      if (!stub) return [];
      return requests.filter((r) => {
        if (r.stubMapping && (r.stubMapping.id === stubId || r.stubMapping.uuid === stubId)) return true;
        return requestMatchesStub(r, stub);
      });
    }

    tabRunner.addEventListener("click", (e) => { e.preventDefault(); showView("runner"); });
    tabWiremock.addEventListener("click", (e) => { e.preventDefault(); showView("wiremock"); });

    wmOwnerSelect.addEventListener("change", () => {
      wmSelectedId = null;
      syncWmAddMockEnabled();
      if (wmOwnerSelect.value) {
        loadWmMappings();
        loadWmRequests();
      } else {
        wmMappings = [];
        renderWmList();
        renderWmDetailEmpty();
        renderWmLogList();
      }
    });
    syncWmAddMockEnabled();

    function formatJson(obj) {
      try {
        return typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
      } catch (_) {
        return String(obj);
      }
    }

    async function apiWiremock(path, options = {}) {
      const opts = { method: options.method || "GET", headers: { "Content-Type": "application/json" } };
      if (options.body !== undefined && opts.method !== "GET") opts.body = JSON.stringify(options.body);
      const res = await fetch("/api/wiremock" + path, opts);
      const text = await res.text();
      if (!res.ok) throw new Error(text || res.statusText);
      return text ? JSON.parse(text) : {};
    }

    async function loadWmMappings() {
      const owner = wmOwnerSelect.value;
      if (!owner) {
        wmMappings = [];
        wmSelectedId = null;
        renderWmList();
        renderWmDetailEmpty();
        return;
      }
      try {
        const body = {
          matchesJsonPath: {
            expression: "$.owner",
            equalTo: owner
          }
        };
        const data = await apiWiremock("/find-by-metadata", { method: "POST", body });
        wmMappings = data.mappings || [];
        renderWmList();
        if (wmSelectedId && !wmMappings.find((m) => m.id === wmSelectedId)) wmSelectedId = null;
        if (wmSelectedId) renderWmDetail();
        else renderWmDetailEmpty();
      } catch (e) {
        wmList.innerHTML = "<div class=\"wm-empty\">Failed to load: " + escapeHtml(e.message || e) + "</div>";
      }
    }

    function wmStubRouteParts(m) {
      const method = (m.request && m.request.method) || "GET";
      const path = (m.request && (m.request.urlPath || m.request.url || m.request.urlPattern)) || "/";
      return { method: method, path: path };
    }

    function renderWmList() {
      wmList.innerHTML = "";
      wmMappings.forEach((m) => {
        const { method, path } = wmStubRouteParts(m);
        const name = m.name != null && String(m.name).trim() !== "" ? String(m.name).trim() : null;
        const el = document.createElement("div");
        el.className = "wm-list-item" + (m.id === wmSelectedId ? " selected" : "");
        el.dataset.id = m.id;
        const routeLine =
          "<div class=\"wm-mock-route\"><span class=\"method\">" + escapeHtml(method) + "</span>" +
          "<span class=\"url\">" + escapeHtml(path) + "</span></div>";
        if (name) {
          el.innerHTML = "<div class=\"wm-mock-name\">" + escapeHtml(name) + "</div>" + routeLine;
        } else {
          el.innerHTML = routeLine;
        }
        el.addEventListener("click", () => { wmSelectedId = m.id; renderWmList(); renderWmDetail(); renderWmLogList(); });
        wmList.appendChild(el);
      });
      if (wmMappings.length === 0) {
        const msg = wmOwnerSelect.value
          ? "No mocks for this owner. Add one to get started."
          : "Select an owner to load mocks from WireMock.";
        wmList.innerHTML = "<div class=\"wm-empty\">" + msg + "</div>";
      }
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function looksLikeXmlString(s) {
      if (typeof s !== "string" || s.length < 9) return false;
      const t = s.trim();
      if (t.startsWith("{") || t.startsWith("[")) return false;
      return t.startsWith("<?xml") || (t.startsWith("<") && t.includes(">"));
    }

    const WM_LARGE_JSON_MIN_CHARS = 500;

    function jsonBodyIsLarge(jsonBody) {
      if (jsonBody == null) return false;
      try {
        return JSON.stringify(jsonBody).length > WM_LARGE_JSON_MIN_CHARS;
      } catch (_) {
        return false;
      }
    }

    function prettyPrintXml(xml) {
      try {
        const reg = /(>)(<)(\/*)/g;
        let xml2 = xml.trim().replace(reg, "$1\r\n$2$3");
        let pad = 0;
        const lines = [];
        xml2.split("\r\n").forEach(function (node) {
          let indent = 0;
          if (node.match(/.+<\/\w[^>]*>$/)) indent = 0;
          else if (node.match(/^<\/\w/) && pad !== 0) pad -= 1;
          else if (node.match(/^<\w[^>]*[^/]>.*$/)) indent = 1;
          else indent = 0;
          let padding = "";
          for (let i = 0; i < pad; i += 1) padding += "  ";
          lines.push(padding + node.trim());
          if (indent) pad += 1;
        });
        return lines.filter(Boolean).join("\n");
      } catch (_) {
        return xml;
      }
    }

    function renderWmDetail() {
      const m = wmMappings.find((x) => x.id === wmSelectedId);
      if (!m) return renderWmDetailEmpty();
      const { method, path } = wmStubRouteParts(m);
      wmDetailMethod.textContent = method || "—";
      const stubName = m.name != null && String(m.name).trim() !== "" ? String(m.name).trim() : null;
      wmDetailUrl.textContent = stubName ? stubName + " · " + path : path;
      wmDetailBody.innerHTML = "";
      const resp = m.response || {};
      const hasLargeJson =
        resp.jsonBody !== undefined &&
        resp.jsonBody !== null &&
        jsonBodyIsLarge(resp.jsonBody);
      const hasInlineXml =
        typeof resp.body === "string" &&
        looksLikeXmlString(resp.body) &&
        resp.jsonBody === undefined;
      let forJson = JSON.parse(JSON.stringify(m));
      if (hasLargeJson) {
        forJson.response = { ...(forJson.response || {}), jsonBody: "[JSON response — see below]" };
      }
      if (hasInlineXml) {
        forJson.response = { ...(forJson.response || {}), body: "[XML response — see below]" };
      }
      const xmlPretty = hasInlineXml ? prettyPrintXml(resp.body) : null;
      const jsonPretty = hasLargeJson ? formatJson(resp.jsonBody) : null;
      const pre = document.createElement("pre");
      pre.className = "json-block";
      pre.style.margin = "0";
      pre.textContent = formatJson(forJson);
      wmDetailBody.appendChild(pre);
      if (jsonPretty) {
        const jtitle = document.createElement("div");
        jtitle.className = "wm-xml-section-title";
        jtitle.textContent = "Response body (JSON)";
        wmDetailBody.appendChild(jtitle);
        const jsonPre = document.createElement("pre");
        jsonPre.className = "json-block wm-json-block";
        jsonPre.style.margin = "0";
        jsonPre.textContent = jsonPretty;
        wmDetailBody.appendChild(jsonPre);
      }
      if (xmlPretty) {
        const title = document.createElement("div");
        title.className = "wm-xml-section-title";
        title.textContent = "Response body (XML)";
        wmDetailBody.appendChild(title);
        const xmlPre = document.createElement("pre");
        xmlPre.className = "json-block wm-xml-block";
        xmlPre.style.margin = "0";
        xmlPre.textContent = xmlPretty;
        wmDetailBody.appendChild(xmlPre);
      }
      wmEditMock.disabled = false;
      wmDuplicateMock.disabled = false;
      wmDeleteMock.disabled = false;
      const bodyFileName = m.response && m.response.bodyFileName;
      wmCurrentBodyFileName = bodyFileName || null;
      wmEditResponseFile.style.display = bodyFileName ? "" : "none";
    }

    function renderWmDetailEmpty() {
      wmDetailMethod.textContent = "—";
      wmDetailUrl.textContent = "Select a mock";
      wmDetailBody.innerHTML = "<span class=\"wm-empty\">Select a mock from the list</span>";
      wmEditMock.disabled = true;
      wmDuplicateMock.disabled = true;
      wmDeleteMock.disabled = true;
      wmCurrentBodyFileName = null;
      wmEditResponseFile.style.display = "none";
    }

    function openEditModal(title, body, onSave) {
      wmModalTitle.textContent = title;
      wmEditMockModal.classList.remove("modal-xml-split");
      wmModalSplitWrap.classList.add("hidden");
      wmModalSplitBody.value = "";

      let jsonPart = body;
      let splitKind = null;
      if (body && typeof body === "object" && body.response && body.response.jsonBody != null &&
          jsonBodyIsLarge(body.response.jsonBody)) {
        splitKind = "json";
        wmEditMockModal.classList.add("modal-xml-split");
        wmModalSplitWrap.classList.remove("hidden");
        wmModalSplitLabel.textContent = "Response body (JSON)";
        wmModalSplitBody.placeholder = "JSON response body";
        wmModalSplitBody.value = formatJson(body.response.jsonBody);
        jsonPart = JSON.parse(JSON.stringify(body));
        jsonPart.response = { ...(jsonPart.response || {}) };
        delete jsonPart.response.jsonBody;
      } else if (body && typeof body === "object" && body.response && typeof body.response.body === "string" &&
          looksLikeXmlString(body.response.body) && body.response.jsonBody === undefined) {
        splitKind = "xml";
        wmEditMockModal.classList.add("modal-xml-split");
        wmModalSplitWrap.classList.remove("hidden");
        wmModalSplitLabel.textContent = "Response body (XML)";
        wmModalSplitBody.placeholder = "XML response body";
        wmModalSplitBody.value = prettyPrintXml(body.response.body);
        jsonPart = JSON.parse(JSON.stringify(body));
        jsonPart.response = { ...(jsonPart.response || {}) };
        delete jsonPart.response.body;
      }

      wmModalBody.value = typeof jsonPart === "string" ? jsonPart : formatJson(jsonPart);
      wmModalOverlay.classList.remove("hidden");
      wmModalBody.focus();

      const save = async () => {
        let json;
        try {
          json = JSON.parse(wmModalBody.value);
        } catch (e) {
          showToast("Invalid JSON");
          return;
        }
        if (splitKind === "xml") {
          json.response = json.response || {};
          json.response.body = wmModalSplitBody.value.trim();
        } else if (splitKind === "json") {
          json.response = json.response || {};
          try {
            json.response.jsonBody = JSON.parse(wmModalSplitBody.value);
          } catch (e) {
            showToast("Invalid JSON in response body");
            return;
          }
        }
        try {
          await onSave(json);
          wmModalOverlay.classList.add("hidden");
          wmEditMockModal.classList.remove("modal-xml-split");
          wmModalSplitWrap.classList.add("hidden");
          loadWmMappings();
          showToast("Saved", "success");
        } catch (e) {
          showToast(e.message || "Failed to save");
        }
      };

      const off = () => {
        wmModalSave.removeEventListener("click", save);
        wmModalClose.removeEventListener("click", close);
        wmModalCancel.removeEventListener("click", close);
        wmModalOverlay.removeEventListener("click", overlayClick);
      };
      const close = () => {
        wmModalOverlay.classList.add("hidden");
        wmEditMockModal.classList.remove("modal-xml-split");
        wmModalSplitWrap.classList.add("hidden");
        off();
      };

      wmModalSave.onclick = save;
      wmModalClose.onclick = close;
      wmModalCancel.onclick = close;
      wmModalOverlay.onclick = function (e) { if (e.target === wmModalOverlay) close(); };
    }

    wmEditMock.addEventListener("click", () => {
      const m = wmMappings.find((x) => x.id === wmSelectedId);
      if (!m) return;
      openEditModal("Edit mock", m, (json) => apiWiremock("/mappings/" + m.id, { method: "PUT", body: json }));
    });

    wmDuplicateMock.addEventListener("click", async () => {
      const m = wmMappings.find((x) => x.id === wmSelectedId);
      if (!m) return;
      const copy = JSON.parse(JSON.stringify(m));
      delete copy.id;
      delete copy.uuid;
      openEditModal("Duplicate mock", copy, (json) => apiWiremock("/mappings", { method: "POST", body: json }));
    });

    wmDeleteMock.addEventListener("click", async () => {
      if (!wmSelectedId) return;
      if (!confirm("Delete this mock?")) return;
      try {
        await apiWiremock("/mappings/" + wmSelectedId, { method: "DELETE" });
        wmSelectedId = null;
        loadWmMappings();
        renderWmDetailEmpty();
        renderWmLogList();
        showToast("Mock deleted", "success");
      } catch (e) {
        showToast(e.message || "Delete failed");
      }
    });

    wmAddMock.addEventListener("click", () => {
      const owner = wmOwnerSelect.value;
      if (!owner) {
        showToast("Select an owner first");
        return;
      }
      const stub = {
        metadata: { owner: owner },
        request: { method: "GET", urlPath: "/example" },
        response: { status: 200, body: "{}" },
        persistent: true
      };
      openEditModal("Add mock", stub, (json) => apiWiremock("/mappings", { method: "POST", body: json }));
    });

    async function loadWmRequests() {
      try {
        const data = await apiWiremock("/requests");
        wmAllRequests = data.requests || [];
        renderWmLogList();
      } catch (e) {
        wmAllRequests = [];
        wmLogList.innerHTML = "<div class=\"wm-empty\">Failed to load log: " + escapeHtml(e.message || e) + "</div>";
      }
    }

    const wmLogSectionTitle = $("#wmLogSectionTitle");
    const wmLogResizeHandle = $("#wmLogResizeHandle");
    const wmLogPanel = $("#wmLogPanel");
    const wmDetailSplitArea = $("#wmDetailSplitArea");
    const WM_LOG_HEIGHT_KEY = "appFactory_wmLogPanelHeightPx";

    function applyWmLogPanelHeight(px) {
      const n = Number(px);
      if (!Number.isFinite(n) || n < 48) return;
      wmLogPanel.style.flex = `0 0 ${Math.round(n)}px`;
    }

    function loadWmLogPanelHeight() {
      const raw = localStorage.getItem(WM_LOG_HEIGHT_KEY);
      if (raw) applyWmLogPanelHeight(parseFloat(raw));
    }

    function initWmLogPanelResizer() {
      let startY = 0;
      let startH = 0;

      wmLogResizeHandle.addEventListener("mousedown", (e) => {
        e.preventDefault();
        startY = e.clientY;
        startH = wmLogPanel.getBoundingClientRect().height;
        document.body.style.cursor = "row-resize";
        document.body.style.userSelect = "none";

        const onMove = (ev) => {
          const splitH = wmDetailSplitArea.getBoundingClientRect().height;
          const handleH = wmLogResizeHandle.offsetHeight;
          const minTop = 100;
          const minLog = 64;
          const maxLog = Math.max(minLog, splitH - minTop - handleH);
          let next = startH - (ev.clientY - startY);
          next = Math.min(maxLog, Math.max(minLog, next));
          wmLogPanel.style.flex = `0 0 ${next}px`;
        };

        const onUp = () => {
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
          const h = wmLogPanel.getBoundingClientRect().height;
          localStorage.setItem(WM_LOG_HEIGHT_KEY, String(Math.round(h)));
        };

        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });
    }

    loadWmLogPanelHeight();
    initWmLogPanelResizer();

    function renderWmLogList() {
      const list = wmSelectedId ? requestsForStub(wmAllRequests, wmSelectedId).slice().reverse() : [];
      wmLogSectionTitle.textContent = wmSelectedId ? "Request log for this mock" : "Request log";
      wmLogList.innerHTML = "";
      if (!wmSelectedId) {
        wmLogList.innerHTML = "<div class=\"wm-empty\">Select a mock to see its request log.</div>";
        return;
      }
      if (list.length === 0) {
        wmLogList.innerHTML = "<div class=\"wm-empty\">No requests matched this mock yet.</div>";
        return;
      }
      list.forEach((r) => {
        const req = r.request || r;
        const el = document.createElement("div");
        el.className = "wm-log-entry";
        const url = req.url || r.url || req.absoluteUrl || r.absoluteUrl || "—";
        const method = req.method || r.method || "—";
        const ts = r.loggedDate ? new Date(r.loggedDate).toLocaleString() : "—";
        const body = req.body || r.body || req.requestBody || r.requestBody || "";
        el.innerHTML =
          "<div class=\"head\"><span class=\"method\">" + escapeHtml(method) + "</span>" +
          "<span class=\"url\">" + escapeHtml(url) + "</span>" +
          "<span class=\"ts\">" + escapeHtml(ts) + "</span></div>" +
          (body ? "<div class=\"body\">" + escapeHtml(typeof body === "string" ? body : formatJson(body)) + "</div>" : "");
        if (body) el.addEventListener("click", () => el.classList.toggle("open"));
        wmLogList.appendChild(el);
      });
    }

    wmRefreshLog.addEventListener("click", loadWmRequests);

    $("#wmResetLog").addEventListener("click", async () => {
      try {
        await apiWiremock("/requests/reset", { method: "POST" });
        loadWmRequests();
        showToast("Log reset", "success");
      } catch (e) {
        showToast(e.message || "Reset failed");
      }
    });

    const wmFileModalOverlay = $("#wmFileModalOverlay");
    const wmFileModalTitle = $("#wmFileModalTitle");
    const wmFileModalBody = $("#wmFileModalBody");
    const wmFileModalClose = $("#wmFileModalClose");
    const wmFileModalCancel = $("#wmFileModalCancel");
    const wmFileModalSave = $("#wmFileModalSave");
    const wmFileFormatJson = $("#wmFileFormatJson");

    function closeFileModal() {
      wmFileModalOverlay.classList.add("hidden");
    }

    wmEditResponseFile.addEventListener("click", async () => {
      if (!wmCurrentBodyFileName) return;
      wmFileModalTitle.textContent = "Edit: " + wmCurrentBodyFileName;
      wmFileModalOverlay.classList.remove("hidden");
      wmFileModalBody.value = "";
      try {
        const res = await fetch("/api/wiremock/files/" + encodeURIComponent(wmCurrentBodyFileName));
        const text = await res.text();
        if (!res.ok) {
          let msg = text;
          try {
            const j = JSON.parse(text);
            if (j.error) msg = j.error;
          } catch (_) {}
          throw new Error(msg);
        }
        wmFileModalBody.value = text;
        wmFileModalBody.focus();
      } catch (e) {
        showToast(e.message || "Failed to load file");
        closeFileModal();
      }
    });

    wmFileModalSave.addEventListener("click", async () => {
      if (!wmCurrentBodyFileName) return;
      const content = wmFileModalBody.value;
      try {
        const res = await fetch("/api/wiremock/files/" + encodeURIComponent(wmCurrentBodyFileName), {
          method: "PUT",
          headers: { "Content-Type": "text/plain" },
          body: content,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || res.statusText);
        }
        closeFileModal();
        showToast("File saved. WireMock will use new content on next request.", "success");
      } catch (e) {
        showToast(e.message || "Save failed");
      }
    });

    wmFileFormatJson.addEventListener("click", () => {
      try {
        const parsed = JSON.parse(wmFileModalBody.value);
        wmFileModalBody.value = JSON.stringify(parsed, null, 2);
        showToast("Formatted", "success");
      } catch (_) {
        showToast("Invalid JSON");
      }
    });

    wmFileModalClose.addEventListener("click", closeFileModal);
    wmFileModalCancel.addEventListener("click", closeFileModal);
    wmFileModalOverlay.addEventListener("click", (e) => { if (e.target === wmFileModalOverlay) closeFileModal(); });

    // Init
    loadConfig();
    checkStatus();
    connectSSE();
  </script>
</body>
</html>
